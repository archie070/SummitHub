<!DOCTYPE html>
<html>
<head>
    <title>Summit Hub</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#0f1117;
            color:white;
            text-align:center;
        }

        .hero{
            padding-top:120px;
        }

        h1{
            font-size:64px;
            margin-bottom:10px;
        }

        p{
            color:#b0b0b0;
            font-size:20px;
        }

        .download-btn{
            display:inline-block;
            margin-top:30px;
            padding:16px 40px;
            background:#5865F2;
            color:white;
            text-decoration:none;
            border-radius:12px;
            font-size:20px;
            font-weight:bold;
            transition:0.2s;
        }

        .download-btn:hover{
            transform:scale(1.05);
        }

        .card{
            width:700px;
            max-width:90%;
            margin:60px auto;
            background:#181c25;
            padding:30px;
            border-radius:20px;
        }
    </style>
</head>
<body>

    <div class="hero">
        <h1>Summit Hub</h1>

        <p>
            The official launcher and hub for Summit projects.
        </p>

        <a class="download-btn" href="#">
            Download Now
        </a>
    </div>

    <div class="card">
        <h2>Features</h2>

        <p>
            • Fast Updates<br>
            • Easy Installation<br>
            • Secure Downloads<br>
            • Future Summit Games Support
        </p>
    </div>

</body>
</html>
